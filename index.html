<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Omnitrix: Prueba de ADN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rubik:wght@400;500;700&display=swap');

:root{
  --bg: #0a0f0c;
  --panel: #101712;
  --omni-green: #39ff9a;
  --omni-green-dim: #1f8f5c;
  --omni-dark: #06120c;
  --text: #e8f5ee;
  --text-dim: #7f9a8d;
  --wrong: #ff5c5c;
  --gold: #ffcf5c;
}

*{ box-sizing: border-box; }

body{
  margin:0;
  background: radial-gradient(ellipse at 50% -10%, #16261c 0%, var(--bg) 55%);
  color: var(--text);
  font-family: 'Rubik', sans-serif;
  min-height: 100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding: 28px 14px 60px;
}

.app{ width: 100%; max-width: 620px; }

h1,h2,h3{ font-family:'Orbitron', sans-serif; margin:0; }

.eyebrow{
  font-family:'Orbitron', sans-serif;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--omni-green);
  text-transform: uppercase;
  margin-bottom: 6px;
  opacity:0.85;
}

.hero{ text-align:center; margin-bottom: 26px; }
.hero h1{ font-size: 30px; font-weight:900; letter-spacing: 1px; color:#fff; text-shadow: 0 0 18px rgba(57,255,154,0.45); }
.hero p{ color: var(--text-dim); margin-top:8px; font-size:14px; line-height:1.5; }

/* --- Omnitrix dial (signature element) --- */
.dial-wrap{ display:flex; justify-content:center; margin: 10px 0 22px; }
.dial{ position:relative; width:120px; height:120px; }
.dial svg{ width:100%; height:100%; }
.dial-center{
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  font-family:'Orbitron', sans-serif; font-weight:700; font-size:13px; color: var(--omni-green);
  text-align:center; line-height:1.1;
}
.dial-center small{ display:block; color: var(--text-dim); font-size:9px; font-family:'Rubik'; letter-spacing:1px; margin-top:2px;}

/* --- Season select cards --- */
.serie-group{ margin-bottom: 22px; }
.serie-title{ font-size:12px; letter-spacing:2px; text-transform:uppercase; color: var(--text-dim); margin: 0 0 10px 2px; }

.card{
  background: linear-gradient(180deg, var(--panel), #0c1310);
  border: 1px solid rgba(57,255,154,0.15);
  border-radius: 10px;
  padding: 16px 18px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color .15s, transform .15s, background .15s;
  display:flex; align-items:center; justify-content:space-between; gap: 14px;
}
.card:hover{ border-color: var(--omni-green); transform: translateY(-1px); background: linear-gradient(180deg,#131f18,#0c1310); }
.card:focus-visible{ outline: 2px solid var(--omni-green); outline-offset:2px; }

.card-left h3{ font-size:15px; color:#fff; margin-bottom:4px; }
.card-left p{ margin:0; font-size:12.5px; color: var(--text-dim); }

.badge{
  font-family:'Orbitron', sans-serif;
  font-size: 10px; font-weight:700; letter-spacing:1px;
  padding: 5px 10px; border-radius: 20px; white-space:nowrap;
  border:1px solid currentColor;
}
.badge.facil{ color:#39ff9a; }
.badge.normal{ color: var(--gold); }
.badge.dificil{ color:#ff9a5c; }
.badge.muydificil{ color: var(--wrong); }
.badge.experto{ color:#c792ff; }

.q-count{ font-family:'Orbitron'; font-size:20px; color: var(--omni-green); font-weight:900; min-width:34px; text-align:center; }
.q-count small{ display:block; font-family:'Rubik'; font-size:8px; color:var(--text-dim); font-weight:400; letter-spacing:1px; }

/* --- Quiz screen --- */
.quiz-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 18px; gap: 12px; }
.progress-track{ flex:1; height:8px; background:#0d1712; border-radius:6px; overflow:hidden; border:1px solid rgba(57,255,154,0.15);}
.progress-fill{ height:100%; background: linear-gradient(90deg, var(--omni-green-dim), var(--omni-green)); transition: width .3s ease; }
.score-tag{ font-family:'Orbitron'; font-size:12px; color: var(--omni-green); white-space:nowrap; }

.q-card{ background: var(--panel); border:1px solid rgba(57,255,154,0.15); border-radius: 12px; padding: 22px 20px; }
.q-meta{ font-size:11px; letter-spacing:2px; text-transform:uppercase; color: var(--text-dim); margin-bottom: 10px; }
.q-text{ font-size: 17px; line-height:1.4; color:#fff; margin-bottom: 20px; font-weight:500; }

.options{ display:flex; flex-direction:column; gap:10px; }
.opt{
  text-align:left;
  background: #0d1712;
  border: 1px solid rgba(232,245,238,0.12);
  color: var(--text);
  padding: 13px 16px;
  border-radius: 8px;
  font-size: 14.5px;
  cursor:pointer;
  transition: all .12s;
  font-family:'Rubik';
}
.opt:hover:not(:disabled){ border-color: var(--omni-green); background:#101d17; }
.opt:disabled{ cursor:default; }
.opt.correct{ border-color: var(--omni-green); background: rgba(57,255,154,0.12); color:#fff; }
.opt.wrong{ border-color: var(--wrong); background: rgba(255,92,92,0.1); color:#fff; }

.feedback{ margin-top:14px; font-size:13px; color: var(--text-dim); min-height:18px; }

.next-btn{
  margin-top:16px; width:100%; padding:13px; border:none; border-radius:8px;
  background: var(--omni-green); color:#062010; font-family:'Orbitron'; font-weight:700;
  font-size:13px; letter-spacing:1px; cursor:pointer; opacity:0; pointer-events:none; transition: opacity .2s;
}
.next-btn.show{ opacity:1; pointer-events:auto; }

/* --- Results --- */
.results{ text-align:center; }
.results .rank{ font-size:22px; color: var(--gold); margin: 14px 0 6px; }
.results .score-big{ font-family:'Orbitron'; font-size:52px; font-weight:900; color:#fff; text-shadow:0 0 20px rgba(57,255,154,0.4); }
.results p{ color: var(--text-dim); font-size:13.5px; line-height:1.6; }
.results-actions{ display:flex; gap:10px; margin-top:22px; flex-wrap:wrap; justify-content:center;}

.review{ text-align:left; margin-top: 26px; border-top: 1px solid rgba(57,255,154,0.15); padding-top: 18px; }
.review-title{ font-size:12px; letter-spacing:2px; text-transform:uppercase; color: var(--text-dim); margin-bottom: 12px; text-align:center; }
.review-empty{ text-align:center; color: var(--omni-green); font-size:13.5px; }
.review-item{ background:#0d1712; border:1px solid rgba(255,92,92,0.25); border-radius:8px; padding:12px 14px; margin-bottom:9px; }
.review-q{ font-size:13px; color:#fff; margin-bottom:7px; line-height:1.4; }
.review-row{ font-size:12.5px; margin-bottom:3px; display:flex; gap:6px; }
.review-row .lbl{ color: var(--text-dim); min-width:64px; flex-shrink:0; }
.review-row .val.wrong{ color: var(--wrong); }
.review-row .val.right{ color: var(--omni-green); }
.btn{
  font-family:'Orbitron'; font-size:12px; font-weight:700; letter-spacing:1px;
  padding:12px 18px; border-radius:8px; cursor:pointer; border:1px solid var(--omni-green);
}
.btn.primary{ background: var(--omni-green); color:#062010; }
.btn.ghost{ background:transparent; color: var(--omni-green); }

.back-link{ background:none; border:none; color: var(--text-dim); font-family:'Rubik'; font-size:12px; cursor:pointer; margin-bottom:16px; display:flex; align-items:center; gap:6px; }
.back-link:hover{ color: var(--omni-green); }

@media (max-width: 420px){
  .card{ padding:13px 14px; }
  .q-text{ font-size:15.5px; }
}
</style>
</head>

function poolFor(season){
  return ALIENS[season.serie].filter(a => a.temp <= season.temp);
}

/* ---------------- QUESTION GENERATION ---------------- */
function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }
function pick(arr,n){ return shuffle(arr).slice(0,n); }

function buildQuestions(season){
  const pool = poolFor(season);
  const allOtherSeasonAliens = Object.values(ALIENS).flat().filter(a => !pool.includes(a));
  const types = season.dificultad==='facil' ? ['poder','identifica']
              : season.dificultad==='normal' ? ['poder','especie','identifica']
              : ['especie','poder','identifica','intruso'];

  const order = shuffle(pool);
  return order.map(alien => {
    let type = types[Math.floor(Math.random()*types.length)];
    if(type==='especie' && !alien.especie) type = 'poder';
    if(type==='poder'){
      const wrong = pick(pool.filter(a=>a.id!==alien.id),3).map(a=>a.poder);
      return {
        meta:`Poder — ${season.serieLabel}`,
        text:`¿Cuál es el poder de "${alien.nombre}"?`,
        options: shuffle([alien.poder, ...wrong]),
        answer: alien.poder,
      };
    }
    if(type==='especie'){
      const wrongPoolEsp = pool.filter(a=>a.especie && a.especie!==alien.especie);
      if(wrongPoolEsp.length>=3){
        const wrong = pick(wrongPoolEsp,3).map(a=>a.especie);
        return {
          meta:`Especie — ${season.serieLabel}`,
          text:`¿A qué especie pertenece "${alien.nombre}"?`,
          options: shuffle([alien.especie, ...wrong]),
          answer: alien.especie,
        };
      }
      // no hay suficientes especies distintas en el pool: cae a pregunta de poder
      const wrong = pick(pool.filter(a=>a.id!==alien.id),3).map(a=>a.poder);
      return {
        meta:`Poder — ${season.serieLabel}`,
        text:`¿Cuál es el poder de "${alien.nombre}"?`,
        options: shuffle([alien.poder, ...wrong]),
        answer: alien.poder,
      };
    }
    if(type==='intruso' && allOtherSeasonAliens.length>=3){
      const intruso = pick(allOtherSeasonAliens,1)[0];
      const otros = pick(pool.filter(a=>a.id!==alien.id),2);
      const opciones = shuffle([alien, ...otros, intruso]);
      return {
        meta:`Intruso — ${season.label}`,
        text:`¿Cuál de estos aliens NO pertenece a "${season.label}" de ${season.serieLabel}?`,
        options: opciones.map(a=>a.nombre),
        answer: intruso.nombre,
      };
    }
    // identifica (por defecto)
    const wrong = pick(pool.filter(a=>a.id!==alien.id),3).map(a=>a.nombre);
    return {
      meta:`Identifica — ${season.serieLabel}`,
      text:`Especie "${alien.especie}", poder: ${alien.poder.toLowerCase()}. ¿Qué alien es?`,
      options: shuffle([alien.nombre, ...wrong]),
      answer: alien.nombre,
    };
  });
}

/* ---------------- STATE ---------------- */
let state = { screen:'home', season:null, questions:[], idx:0, score:0, answered:false, history:[] };

/* ---------------- RENDER ---------------- */
const app = document.getElementById('app');

function dialSVG(filled, total, colorClass){
  const segs = total;
  const r = 50, cx=60, cy=60;
  let paths = '';
  for(let i=0;i<segs;i++){
    const gap = 4; // degrees gap between segments
    const segAngle = 360/segs - gap;
    const start = i*(360/segs) - 90 + gap/2;
    const end = start + segAngle;
    const large = segAngle>180?1:0;
    const toRad = d => d*Math.PI/180;
    const x1 = cx + r*Math.cos(toRad(start));
    const y1 = cy + r*Math.sin(toRad(start));
    const x2 = cx + r*Math.cos(toRad(end));
    const y2 = cy + r*Math.sin(toRad(end));
    const active = i < filled;
    paths += `<path d="M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}"
      stroke="${active?'#39ff9a':'#1a2b22'}" stroke-width="9" fill="none" stroke-linecap="round"/>`;
  }
  return `<svg viewBox="0 0 120 120">${paths}</svg>`;
}

function render(){
  if(state.screen==='home') return renderHome();
  if(state.screen==='quiz') return renderQuiz();
  if(state.screen==='results') return renderResults();
}

function renderHome(){
  const groups = {};
  SEASONS.forEach(s=>{ (groups[s.serieLabel] ??= []).push(s); });

  app.innerHTML = `
    <div class="hero">
      <div class="eyebrow">Prueba de ADN alienígena</div>
      <h1>OMNITRIX: PRUEBA DE ADN</h1>
      <p>Elige una serie y temporada. Entre más aliens haya desbloqueado Ben para ese momento,<br>más preguntas y más difícil será la prueba.</p>
      <p style="font-size:11.5px; opacity:0.7; margin-top:10px;">Nota: Omniverse tiene 8 temporadas cortas de ~10 episodios, así que aquí van agrupadas en 3 bloques.</p>
    </div>
    ${Object.entries(groups).map(([serie, seasons])=>`
      <div class="serie-group">
        <div class="serie-title">${serie}</div>
        ${seasons.map(s=>{
          const total = poolFor(s).length;
          return `<div class="card" tabindex="0" data-serie="${s.serie}" data-temp="${s.temp}">
            <div class="card-left">
              <h3>${s.label}</h3>
              <p>${s.desc}</p>
            </div>
            <span class="badge ${s.dificultad}">${s.dificultadLabel}</span>
            <div class="q-count">${total}<small>PREG.</small></div>
          </div>`;
        }).join('')}
      </div>
    `).join('')}
  `;

  app.querySelectorAll('.card').forEach(card=>{
    const start = ()=>{
      const serie = card.dataset.serie, temp = Number(card.dataset.temp);
      const season = SEASONS.find(s=>s.serie===serie && s.temp===temp);
      state = { screen:'quiz', season, questions: buildQuestions(season), idx:0, score:0, answered:false, history:[] };
      render();
    };
    card.addEventListener('click', start);
    card.addEventListener('keydown', e=>{ if(e.key==='Enter') start(); });
  });
}

function renderQuiz(){
  const q = state.questions[state.idx];
  const total = state.questions.length;
  const pct = (state.idx/total)*100;

  app.innerHTML = `
    <button class="back-link" id="quit">← Volver a elegir temporada</button>
    <div class="quiz-header">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="score-tag">${state.score}/${total}</div>
    </div>
    <div class="dial-wrap">
      <div class="dial">
        ${dialSVG(state.idx, total)}
        <div class="dial-center">${state.idx+1}<small>DE ${total}</small></div>
      </div>
    </div>
    <div class="q-card">
      <div class="q-meta">${q.meta} · Pregunta ${state.idx+1}</div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${q.options.map(opt=>`<button class="opt" data-opt="${encodeURIComponent(opt)}">${opt}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="next">${state.idx===total-1 ? 'VER RESULTADOS' : 'SIGUIENTE'}</button>
    </div>
  `;

  document.getElementById('quit').addEventListener('click', ()=>{ state.screen='home'; render(); });

  const optBtns = app.querySelectorAll('.opt');
  optBtns.forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(state.answered) return;
      state.answered = true;
      const chosen = decodeURIComponent(btn.dataset.opt);
      const correct = chosen === q.answer;
      if(correct) state.score++;
      state.history.push({ text: q.text, chosen, answer: q.answer, correct });
      optBtns.forEach(b=>{
        b.disabled = true;
        const val = decodeURIComponent(b.dataset.opt);
        if(val === q.answer) b.classList.add('correct');
        else if(b===btn) b.classList.add('wrong');
      });
      document.getElementById('feedback').textContent = correct
        ? '¡Correcto! Buen trabajo, portador del Omnitrix.'
        : `Incorrecto. La respuesta era: ${q.answer}`;
      document.getElementById('next').classList.add('show');
    });
  });

  document.getElementById('next').addEventListener('click', ()=>{
    if(state.idx < total-1){
      state.idx++;
      state.answered = false;
      render();
    } else {
      state.screen = 'results';
      render();
    }
  });
}

function renderResults(){
  const total = state.questions.length;
  const pct = Math.round((state.score/total)*100);
  let rank, msg;
  if(pct===100){ rank='Portador Supremo del Omnitrix'; msg='Conoces cada ADN al pie de la letra. Azmuth estaría orgulloso.'; }
  else if(pct>=80){ rank='Héroe Galáctico'; msg='Dominas casi todos los aliens de esta temporada.'; }
  else if(pct>=60){ rank='Salvador de la Tierra'; msg='Buen conocimiento, pero repasa algunas transformaciones.'; }
  else if(pct>=40){ rank='Aprendiz de Plomero'; msg='Vas por buen camino, pero te faltan algunas fichas de ADN.'; }
  else { rank='Novato del Omnitrix'; msg='Toca darle rewatch a la temporada antes de la próxima misión.'; }

  const fallos = state.history.filter(h=>!h.correct);

  app.innerHTML = `
    <div class="q-card results">
      <div class="eyebrow">${state.season.serieLabel} · ${state.season.label}</div>
      <div class="score-big">${state.score}/${total}</div>
      <div class="rank">${rank}</div>
      <p>${msg}</p>
      <div class="results-actions">
        <button class="btn primary" id="retry">REPETIR</button>
        <button class="btn ghost" id="home">OTRA TEMPORADA</button>
      </div>
      <div class="review">
        <div class="review-title">Preguntas falladas (${fallos.length})</div>
        ${fallos.length===0 ? '<div class="review-empty">¡Ninguna! ADN perfecto en esta temporada.</div>' : fallos.map(f=>`
          <div class="review-item">
            <div class="review-q">${f.text}</div>
            <div class="review-row"><span class="lbl">Tu respuesta:</span><span class="val wrong">${f.chosen}</span></div>
            <div class="review-row"><span class="lbl">Correcta:</span><span class="val right">${f.answer}</span></div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  document.getElementById('retry').addEventListener('click', ()=>{
    state = { screen:'quiz', season:state.season, questions: buildQuestions(state.season), idx:0, score:0, answered:false, history:[] };
    render();
  });
  document.getElementById('home').addEventListener('click', ()=>{ state.screen='home'; render(); });
}

render();
</script>
</body>
</html>
